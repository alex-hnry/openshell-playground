apiVersion: v1
kind: Service
metadata:
  name: {{ include "navigator.fullname" . }}
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
      appProtocol: grpc
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "navigator.selectorLabels" . | nindent 4 }}
