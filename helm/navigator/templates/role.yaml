apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "navigator.fullname" . }}-sandbox
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - agents.x-k8s.io
    resources:
      - sandboxes
      - sandboxes/status
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
